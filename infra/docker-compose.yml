# Runs the whole TaxonGuard stack with one command:
#   docker compose -f infra/docker-compose.yml up --build
# The web app is then at http://localhost:3000 and the API at http://localhost:8000.
# No secret keys are required to run or review.

services:
  api:
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
    ports:
      - "8000:8000"
    environment:
      TAXONGUARD_CORS_ORIGINS: '["http://localhost:3000"]'
    # Mounts the host's data directory (WorldClim rasters and Natural Earth land
    # polygons) so on-demand scoring can run the climate and land/sea checks.
    # Download it once on the host with:
    #   uv run python -m taxonguard_core.data.worldclim --download
    #   uv run python -m taxonguard_core.data.naturalearth --download
    # Without it, only the coordinate-quality checks have what they need.
    volumes:
      - ../data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: ..
      dockerfile: infra/web.Dockerfile
      # NEXT_PUBLIC_API_BASE_URL is read by apps/web (src/lib/api.ts) and is inlined
      # by Next.js at build time, so it is passed as a build arg, not a runtime env.
      args:
        NEXT_PUBLIC_API_BASE_URL: "http://localhost:8000"
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
